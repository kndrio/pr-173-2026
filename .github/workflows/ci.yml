name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, orders-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Ruff lint
        run: ruff check services/${{ matrix.service }}/app/

      - name: Run tests
        run: pytest services/${{ matrix.service }}/tests/ -v
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: test-secret-key-for-ci
          REDIS_URL: redis://localhost:6379/0

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [shell, orders-mfe]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/${{ matrix.app }}/package.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend/${{ matrix.app }}

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend/${{ matrix.app }}

      - name: Build
        run: npm run build
        working-directory: frontend/${{ matrix.app }}
