server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Module Federation: allow Shell (HOST at :3000) to load remote assets cross-origin.
    # This covers remoteEntry.js AND all shared/lazy chunks loaded by the federation runtime.
    location /assets/ {
        add_header Access-Control-Allow-Origin "http://localhost:3000" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        # remoteEntry.js must not be cached so the HOST always gets the latest manifest
        location /assets/remoteEntry.js {
            add_header Access-Control-Allow-Origin "http://localhost:3000" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            try_files $uri =404;
        }
        try_files $uri =404;
    }

    # Proxy for standalone dev mode
    location /api/auth/ {
        proxy_pass http://auth-service:8001/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/orders/ {
        proxy_pass http://orders-service:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
